      urgency: normal
      groups: api,global
      pinned: false

discovery:
  docs_dirs: docs,.docs

groups:
  auth:
    color: "#10b981"
    label: Authentication
    pinned: false
  global:
    color: "#3b82f6"
    label: Global
    pinned: true

files:
  hide_source_only: false
