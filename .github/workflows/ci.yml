name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Lint (oxlint + fallow + dependency-cruiser + ast-grep + knip)
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Typecheck source (includes test files)
        run: npx tsc -p tsconfig.check.json --noEmit
      # Examples resolve `storium` from `dist`, so build before typechecking them.
      - name: Build
        run: npm run build
      - name: Install example dependencies
        run: |
          for dir in examples/*/; do
            echo "--- installing $dir ---"
            (cd "$dir" && npm install --no-audit --no-fund)
          done
      - name: Typecheck examples
        run: npm run typecheck:examples

  unit:
    name: Unit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # `npm ci` compiles better-sqlite3 against this Node version, so no
      # NODE_MODULE_VERSION mismatch (see CONTRIBUTING.md).
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:run

  integration:
    name: Integration (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      # ubuntu-latest ships a running Docker daemon, which testcontainers uses
      # to start real PostgreSQL and MySQL instances.
      - name: Integration tests (testcontainers)
        run: npm run test:integration
